name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          # Updater signing (signs the update artifact, separate from Apple)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple code signing (the .app / .dmg)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "攀达桌游 ${{ github.ref_name }}"
          releaseBody: |
            ## What's new
            See commits since previous tag.

            ---
            **Install:** Apple Silicon Mac required (M1+). Download the `.dmg`, open and drag to Applications.
            **Existing users:** the app will auto-update on next launch.
          releaseDraft: false
          prerelease: false
          args: --target aarch64-apple-darwin

      - name: Repack DMG with 攀达桌游.app inside
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET: aarch64-apple-darwin
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          # tauri-action's keychain went away with its step; bring back the
          # signing identity in a fresh keychain so codesign --sign works.
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)
          KEYCHAIN_PATH="$RUNNER_TEMP/repack.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

          # Run the rename + repack script. It operates on the artifacts that
          # tauri-action just produced under target/$TARGET/release/bundle/.
          bash src-tauri/scripts/ci-rename-bundle.sh

          # Re-upload the DMG to the published release, replacing the
          # original. Filename stays ASCII so latest.json's pointer is still
          # valid. Updater tarball + .sig + latest.json are unchanged.
          DMG_PATH=$(ls src-tauri/target/$TARGET/release/bundle/dmg/*.dmg | head -1)
          echo "Re-uploading $(basename "$DMG_PATH") to release $TAG"
          gh release upload "$TAG" "$DMG_PATH" --clobber --repo "$GH_REPO"
